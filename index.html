<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raj Mini Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050b2d;
color:white;
}

.header{
display:flex;
align-items:center;
padding:10px;
background:#08123f;
}

.logo{
width:70px;
height:70px;
border-radius:50%;
margin-right:10px;
}

.brand{
font-size:28px;
font-weight:bold;
}

.tagline{
font-size:12px;
color:#ddd;
}

.hero{
padding:20px;
text-align:center;
}

.btn{
background:#ff2ea6;
color:white;
padding:12px 20px;
border:none;
border-radius:10px;
font-size:16px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#08123f;
display:flex;
justify-content:space-around;
padding:12px 0;
}
</style>
</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<div>
<div class="brand">Raj Mini Store</div>
<div class="tagline">
Best Quality • Best Price • Trusted Store
</div>
</div>

</div>

<div class="hero">

  <div style="padding:20px;">
<h2>Our Products</h2>

<div id="products"
style="
display:grid;
grid-template-columns:1fr;
gap:15px;
">
Loading Products...
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
"https://kpswfoxhfnqcqfiybttb.supabase.co",
"sb_publishable_UM1grvRRMosVkHtBh-D74g_JnYEjj5P"
);

async function loadProducts(){

const { data, error } = await supabase
.from("products")
.select("*")
.order("id",{ascending:false});

if(error){
document.getElementById("products").innerHTML =
"Products Load Error";
return;
}

let html = "";

data.forEach(product => {

html += `
<div style="
background:#18245e;
padding:15px;
border-radius:12px;
">

<img src="${product.image_url}"
style="
width:100%;
border-radius:10px;
">

<h3>${product.name}</h3>

<p>₹${product.price}</p>

<button class="btn">
Buy Now
</button>

</div>
`;

});

document.getElementById("products").innerHTML = html;
}

loadProducts();
</script>

<div class="bottom">
<div>🏠 Home</div>
<div>📦 Orders</div>
<div>💬 Support</div>
<div>👤 Account</div>
</div>

</body>
  </html>
